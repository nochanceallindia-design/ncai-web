<section class="section" id="report">

<h2>Report an Issue</h2>

<form>

<input type="text" placeholder="Full Name" required>

<input type="text" placeholder="State" required>

<input type="text" placeholder="District" required>

<input type="text" placeholder="Village / City">

<input type="tel" placeholder="Mobile Number">

<select>
<option>Select Issue Type</option>
<option>Corruption</option>
<option>Road Problem</option>
<option>Water Problem</option>
<option>Electricity Problem</option>
<option>Government Service</option>
<option>Other</option>
</select>

<input type="file">

<textarea rows="6" placeholder="Describe your issue in detail"></textarea>

<button type="submit">Submit Report</button>

</form>

</section>
